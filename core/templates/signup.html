{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | SecureVault</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>

        .global-back { 
            position: absolute; 
            top: 30px; 
            left: 30px; 
            color: var(--text-muted); 
            text-decoration: none; 
            font-weight: 500; 
            transition: all 0.3s ease; 
            z-index: 100; font-size: 1.05rem; }

        .global-back:hover { 
            color: var(--accent-blue); 
            transform: translateX(-5px); }

        @media (max-width: 600px) { 
            .global-back { 
                top: 15px; 
                left: 15px; 
                font-size: 0.95rem; } }

        :root { --bg-dark: #070B14; --glass-bg: rgba(255, 255, 255, 0.02); --glass-border: rgba(255, 255, 255, 0.08); --accent-blue: #3B82F6; --text-main: #F8FAFC; --text-muted: #94A3B8; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; padding: 20px; box-sizing: border-box; }
        
        .ambient-orb { position: absolute; border-radius: 50%; filter: blur(100px); z-index: -1; animation: floatOrb 10s infinite alternate; }
        .orb-1 { width: 600px; height: 600px; background: rgba(59, 130, 246, 0.15); top: -200px; left: -200px; }
        .orb-2 { width: 500px; height: 500px; background: rgba(59, 130, 246, 0.1); bottom: -100px; right: -100px; animation-delay: -5s; }
        
        .auth-container { 
            display: flex; flex-direction: row; 
            width: 1000px; max-width: 100%; height: 650px; 
            background: var(--glass-bg); backdrop-filter: blur(24px); 
            border: 1px solid var(--glass-border); border-radius: 24px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); overflow: hidden; 
        }
        
        .auth-brand { 
            flex: 1; padding: 60px; position: relative; 
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), transparent); 
            border-right: 1px solid var(--glass-border); 
            display: flex; flex-direction: column; justify-content: space-between; 
            animation: slideInFromRight 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .brand-logo { font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 700; }
        .brand-logo span { color: var(--accent-blue); }
        .brand-text h2 { font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin-bottom: 15px; line-height: 1.2; }
        .brand-text ul { list-style: none; padding: 0; margin-top: 20px; }
        .brand-text li { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .brand-text li::before { content: "✓"; color: var(--accent-blue); font-weight: bold; }
        .brand-footer { font-size: 0.85rem; color: var(--text-muted); }

        .auth-form-panel { 
            flex: 1; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center;
            animation: slideInFromLeft 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            overflow-y: auto;
        }

        .glass-tabs { display: flex; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 12px; padding: 6px; margin-bottom: 25px; flex-shrink: 0; }
        .tab { flex: 1; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: all 0.3s ease; }
        .tab.active { background: rgba(59, 130, 246, 0.15); color: #fff; border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2); }
        .tab.inactive { color: var(--text-muted); }
        .tab.inactive:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }

        .auth-form-panel form p { margin-bottom: 12px; text-align: left; }
        .auth-form-panel label { display: block; margin-bottom: 6px; color: var(--text-muted); font-weight: 500; font-size: 0.9rem; }
        input[type="text"], input[type="password"], input[type="email"] { width: 100%; padding: 10px 14px; font-size: 0.95rem; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 8px; box-sizing: border-box; font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        input:focus { border-color: var(--accent-blue); outline: none; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15); transform: translateY(-2px); }
        
        .helptext, form ul { display: none !important; }
        .errorlist { display: block !important; color: #EF4444; list-style: none; padding: 0; font-size: 0.85rem; margin-bottom: 10px; }

        .btn-primary { width: 100%; padding: 14px; margin-top: 10px; background: var(--accent-blue); color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(59, 130, 246, 0.5); }

        @keyframes slideInFromLeft { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideInFromRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes floatOrb { from { transform: translate(0, 0); } to { transform: translate(30px, 30px); } }

        /* --- RESPONSIVE MEDIA QUERIES (TABLET & MOBILE) --- */
        @media (max-width: 850px) {
            body { overflow-y: auto; align-items: flex-start; }
            .auth-container { 
                flex-direction: column !important; 
                height: auto; min-height: 100%; 
            }
            .auth-brand { 
                padding: 30px 20px; border-right: none; border-bottom: 1px solid var(--glass-border);
                animation: none; 
            }
            .brand-logo { font-size: 1.6rem; }
            .brand-text h2 { font-size: 1.8rem; margin-bottom: 10px; }
            .brand-text li { font-size: 0.95rem; margin-bottom: 8px; }
            .brand-text ul { margin-top: 10px; }
            .brand-footer { display: none; }
            
            .auth-form-panel { padding: 30px 20px; animation: none; }
            
            .orb-1 { width: 300px; height: 300px; top: -50px; left: -50px; }
            .orb-2 { width: 300px; height: 300px; bottom: -50px; right: -50px; }
        }
    </style>
</head>
<body>
    <a href="javascript:history.back()" class="global-back">← Back</a>

    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>

    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-logo">SecureVault<span>.</span></div>
            <div class="brand-text">
                <h2>Initialize your secure node.</h2>
                <ul>
                    <li>AES-256 Application Encryption</li>
                    <li>Mandatory 2FA Verification</li>
                    <li>Zero-Knowledge Architecture</li>
                </ul>
            </div>
            <div class="brand-footer">© 2026 SecureVault Systems</div>
        </div>

        <div class="auth-form-panel">
            <div class="glass-tabs">
                <a href="{% url 'login' %}" class="tab inactive">Sign In</a>
                <a href="{% url 'signup' %}" class="tab active">Sign Up</a>
            </div>

            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn-primary">Initialize Node</button>
            </form>
        </div>
    </div>

</body>
</html>
